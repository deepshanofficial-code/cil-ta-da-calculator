<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CIL TA/DA System</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background: linear-gradient(180deg,#000,#111);
  color:white;
}

.container {
  max-width:540px;
  margin:auto;
  padding:20px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(25px);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

h2 { text-align:center; }

input, select, button {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

button {
  background: linear-gradient(135deg,#0071e3,#00c6ff);
}

.result {
  background:rgba(255,255,255,0.08);
  padding:15px;
  border-radius:12px;
  white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<h2>TA/DA Claim Engine</h2>

<div class="card">

<label>Employee Category</label>
<select id="grade">
<option value="board">Board Level</option>
<option value="e9">E9</option>
<option value="e78">E7–E8</option>
<option value="e46">E4–E6</option>
<option value="e13">E1–E3</option>
<option value="non_high">Non-Exec (High)</option>
<option value="non_low">Non-Exec (Low)</option>
</select>

<label>City</label>
<input id="city">

<label>Stay Type</label>
<select id="stay">
<option value="hotel">Hotel</option>
<option value="own">Own Arrangement</option>
<option value="guest">Guest</option>
</select>

<label>Departure</label>
<input type="datetime-local" id="start">

<label>Arrival</label>
<input type="datetime-local" id="end">

</div>

<div class="card">

<h3>Upload Receipts</h3>

<input type="file" id="trainFile">
<input type="file" id="cabFile">
<input type="file" id="hotelFile">

<button onclick="scan()">Scan Receipts</button>

<label>Train (₹)</label>
<input id="train" type="number">

<label>Cab (₹ or km)</label>
<input id="cab" type="number">

<select id="mode">
<option value="amt">Direct</option>
<option value="km">Per KM</option>
</select>

<label>Hotel (₹)</label>
<input id="hotel" type="number">

</div>

<div class="card">

<button onclick="calculate()">Calculate</button>
<button onclick="pdf()">Download PDF</button>

<div class="result" id="out"></div>

</div>

</div>

<script>

// INR
function INR(x){return "₹"+Number(x||0).toLocaleString("en-IN");}

// LOCATION
const spec=["delhi","mumbai","kolkata","chennai","bangalore","hyderabad"];
function loc(c){return spec.includes(c.toLowerCase())?"specified":"other";}

// DA MATRIX (LOCKED)
const DA={
 board:{specified:3700,other:3400},
 e9:{specified:3200,other:3000},
 e78:{specified:3100,other:2500},
 e46:{specified:2300,other:1800},
 e13:{specified:1800,other:1500},
 non_high:{specified:2200,other:2000},
 non_low:{specified:1200,other:1000}
};

// STAY RULE
function stayAdj(base,stay){
 if(stay==="guest") return base*0.5;
 if(stay==="own") return base*0.75;
 return base;
}

// DAYS
function days(s,e){
 let h=(e-s)/(1000*60*60);
 let f=Math.floor(h/24);
 let r=h%24;
 if(r>12) return f+1;
 if(r>6) return f+0.5;
 return f;
}

// CAB RATE
function cabRate(g){
 if(["board","e9"].includes(g)) return 15;
 if(["e78","e46"].includes(g)) return 12;
 return 8;
}

// OCR
async function extract(file){
 if(!file) return 0;
 let {data:{text}}=await Tesseract.recognize(file,'eng');
 let m=text.match(/\d{3,6}/);
 return m?parseInt(m[0]):0;
}

async function scan(){
 let t=await extract(trainFile.files[0]);
 let c=await extract(cabFile.files[0]);
 let h=await extract(hotelFile.files[0]);

 if(t) train.value=t;
 if(c) cab.value=c;
 if(h) hotel.value=h;

 alert("Verify scanned values");
}

// MAIN
function calculate(){

 let g=grade.value;
 let c=city.value;
 let s=stay.value;

 let start=new Date(startInput.value||start.value);
 let end=new Date(endInput.value||end.value);

 let l=loc(c);
 let d=days(start,end);

 let base=DA[g][l];
 let rate=stayAdj(base,s);
 let da=rate*d;

 let trainAmt=Number(train.value||0);
 let cabAmt=Number(cab.value||0);
 let hotelAmt=Number(hotel.value||0);

 if(mode.value==="km"){
   cabAmt=cabAmt*cabRate(g);
 }

 let total=Math.round(da+trainAmt+cabAmt+hotelAmt);

 let text=`
--- TA/DA SUMMARY ---

Grade: ${g}
Location: ${c} (${l})

DA Rate: ${INR(rate)}
Days: ${d}
DA: ${INR(da)}

Train: ${INR(trainAmt)}
Cab: ${INR(cabAmt)}
Hotel: ${INR(hotelAmt)}

TOTAL: ${INR(total)}

JUSTIFICATION:
• Rates applied as per CIL TA Rules (2010 + revisions)
• Location classification applied
• Stay adjustment applied (Hotel/Own/Guest)
• Cab restricted by eligibility slab
• Train reimbursed as actual
`;

 out.innerText=text;
 window.finalText=text;
}

// PDF
function pdf(){
 const {jsPDF}=window.jspdf;
 let doc=new jsPDF();
 doc.text(window.finalText||"No data",10,10);
 doc.save("TA_DA.pdf");
}

</script>

</body>
</html>
