<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIL TA/DA Platform</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

/* GLOBAL */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #eef2ff, #fdf2ff, #ecfeff);
  color: #111;
}

.wrapper {
  max-width: 900px;
  margin: auto;
  padding: 30px 20px;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 30px;
}

.header h1 {
  margin: 0;
  font-size: 28px;
}

.header p {
  color: #666;
  font-size: 14px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(15px);
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.full {
  grid-column: span 2;
}

/* INPUT */
label {
  font-size: 12px;
  color: #555;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

/* BUTTONS */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: 500;
  cursor: pointer;
}

.primary {
  background: linear-gradient(135deg, #2563eb, #06b6d4);
  color: white;
}

.secondary {
  background: #eee;
}

/* RESULT */
.result {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  white-space: pre-line;
  font-size: 14px;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<h1>TA/DA Claim System</h1>
<p>Coal India Limited — Smart Claim Engine</p>
</div>

<!-- EMPLOYEE -->
<div class="card">
<h3>Employee Details</h3>

<div class="grid">
<div>
<label>Grade</label>
<select id="grade">
<option value="board">Board</option>
<option value="e9">E9</option>
<option value="e78">E7–E8</option>
<option value="e46">E4–E6</option>
<option value="e13">E1–E3</option>
<option value="non_high">Non Exec High</option>
<option value="non_low">Non Exec Low</option>
</select>
</div>

<div>
<label>City</label>
<input id="city">
</div>

<div>
<label>Stay Type</label>
<select id="stay">
<option value="hotel">Hotel</option>
<option value="own">Own</option>
<option value="guest">Guest</option>
</select>
</div>

<div>
<label>Location Type</label>
<input id="locDisplay" disabled>
</div>

<div>
<label>Departure</label>
<input type="datetime-local" id="start">
</div>

<div>
<label>Arrival</label>
<input type="datetime-local" id="end">
</div>

</div>
</div>

<!-- RECEIPTS -->
<div class="card">
<h3>Upload Receipts</h3>

<div class="grid">
<input type="file" id="trainFile">
<input type="file" id="cabFile">
<input type="file" id="hotelFile">
</div>

<button class="secondary" onclick="scan()">Scan Receipts</button>
</div>

<!-- EXPENSES -->
<div class="card">
<h3>Expenses</h3>

<div class="grid">
<input type="number" id="train" placeholder="Train ₹">
<input type="number" id="cab" placeholder="Cab ₹ / KM">

<select id="mode">
<option value="amt">Direct Amount</option>
<option value="km">Per KM</option>
</select>

<input type="number" id="hotel" placeholder="Hotel ₹">
</div>
</div>

<!-- ACTION -->
<div class="card">
<div class="actions">
<button class="primary" onclick="calculate()">Calculate</button>
<button class="secondary" onclick="pdf()">PDF</button>
</div>

<div class="result" id="out"></div>
</div>

</div>

<script>

// INR
function INR(x){return "₹"+Number(x||0).toLocaleString("en-IN");}

// LOCATION
const spec=["delhi","mumbai","kolkata","chennai","bangalore","hyderabad"];
function loc(c){
 let t = spec.includes((c||"").toLowerCase())?"specified":"other";
 document.getElementById("locDisplay").value = t;
 return t;
}

// DA
const DA={
 board:{specified:3700,other:3400},
 e9:{specified:3200,other:3000},
 e78:{specified:3100,other:2500},
 e46:{specified:2300,other:1800},
 e13:{specified:1800,other:1500},
 non_high:{specified:2200,other:2000},
 non_low:{specified:1200,other:1000}
};

// DAYS
function days(s,e){
 let h=(e-s)/(1000*60*60);
 let f=Math.floor(h/24);
 let r=h%24;
 if(r>12) return f+1;
 if(r>6) return f+0.5;
 return f;
}

// CAB RATE
function cabRate(g){
 if(["board","e9"].includes(g)) return 15;
 if(["e78","e46"].includes(g)) return 12;
 return 8;
}

// OCR
async function extract(file){
 if(!file) return 0;
 let {data:{text}}=await Tesseract.recognize(file,'eng');
 let m=text.match(/\d{3,6}/);
 return m?parseInt(m[0]):0;
}

async function scan(){
 let t=await extract(trainFile.files[0]);
 let c=await extract(cabFile.files[0]);
 let h=await extract(hotelFile.files[0]);

 if(t) train.value=t;
 if(c) cab.value=c;
 if(h) hotel.value=h;

 alert("Verify scanned values");
}

// MAIN
function calculate(){

 let g=grade.value;
 let c=city.value;
 let s=stay.value;

 let startDate=new Date(start.value);
 let endDate=new Date(end.value);

 let l=loc(c);
 let d=days(startDate,endDate);

 let base=DA[g][l];
 let rate = s==="guest"?base*0.5 : s==="own"?base*0.75 : base;

 let da=rate*d;

 let trainAmt=Number(train.value||0);
 let cabAmt=Number(cab.value||0);
 let hotelAmt=Number(hotel.value||0);

 if(mode.value==="km"){
   cabAmt = cabAmt * cabRate(g);
 }

 let total=Math.round(da+trainAmt+cabAmt+hotelAmt);

 let text=`
TA/DA SUMMARY

Grade: ${g}
Location: ${c} (${l})

DA Rate: ${INR(rate)}
Days: ${d}
DA: ${INR(da)}

Train: ${INR(trainAmt)}
Cab: ${INR(cabAmt)}
Hotel: ${INR(hotelAmt)}

TOTAL: ${INR(total)}

RULES APPLIED:
• DA slab based on grade & location
• Guest stay = 50%
• Own stay = reduced DA
• Cab limited by eligibility
`;

 out.innerText=text;
 window.finalText=text;
}

// PDF
function pdf(){
 const {jsPDF}=window.jspdf;
 let doc=new jsPDF();
 doc.text(window.finalText||"No data",10,10);
 doc.save("TA_DA.pdf");
}

</script>

</body>
</html>
